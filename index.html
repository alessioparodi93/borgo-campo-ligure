const getStagione = (dataStr) => {
  if(!dataStr) return null;
  const d = new Date(dataStr);
  const y = d.getFullYear();
  const m = d.getMonth(); // 0=gen
  if(m >= 6) return `${y}-${y+1}`; // luglio(6)-dicembre
  return `${y-1}-${y}`; // gennaio-giugno
};
const getStagioneCorrente = () => {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  if(m >= 6) return `${y}-${y+1}`;
  return `${y-1}-${y}`;
};

function FF({label,size,children}){

function Btn({onClick,color="blue",children,small,full,disabled}){
  const p={
    blue:{bg:C.blue,fg:"#fff",bd:C.blue},
    ghost:{bg:"transparent",fg:C.text,bd:C.border},
    green:{bg:C.greenBg,fg:C.green,bd:C.greenBorder},
    red:{bg:C.redBg,fg:C.red,bd:C.redBorder},
    orange:{bg:C.orangeBg,fg:C.orange,bd:C.orangeBorder},
    dark:{bg:"rgba(0,102,179,.2)",fg:C.goldLight,bd:C.border},
  }[color]||{bg:"transparent",fg:C.text,bd:C.border};
  return <button onClick={onClick} disabled={disabled} style={{background:p.bg,color:p.fg,border:`1px solid ${p.bd}`,borderRadius:10,padding:small?"8px 12px":"11px 18px",cursor:disabled?"not-allowed":"pointer",fontWeight:700,fontSize:small?12:14,display:"inline-flex",alignItems:"center",gap:5,width:full?"100%":undefined,justifyContent:full?"center":undefined,whiteSpace:"nowrap",flexShrink:0,opacity:disabled?.6:1}}>{children}</button>;
}

function MembroForm({data, tipo, onSave, onCancel, saving}){
  const [d,setD]=useState({...data});
  const S=k=>e=>setD(p=>({...p,[k]:e.target.value}));
  const sec={fontSize:10,color:C.goldLight,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${C.border}`};
  return(
    <div>
      <div style={{marginBottom:16}}><div style={sec}>📋 Identificazione</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {tipo!=="direttivo"&&<FF label="N° Tessera" size="quarter"><input value={d.tessera||""} onChange={S("tessera")} style={IS}/></FF>}
          <FF label="Cognome"><input value={d.cognome||""} onChange={S("cognome")} style={IS}/></FF>
          <FF label="Nome"><input value={d.nome||""} onChange={S("nome")} style={IS}/></FF>
          <FF label="Sesso" size="quarter"><select value={d.sesso||""} onChange={S("sesso")} style={IS}><option value="">—</option><option value="M">M</option><option value="F">F</option></select></FF>
          {tipo==="giocatore"&&<FF label="Ruolo"><select value={d.ruolo||""} onChange={S("ruolo")} style={IS}><option value="">— Seleziona —</option>{RUOLI_GIOCATORE.map(r=><option key={r} value={r}>{r}</option>)}</select></FF>}
          {tipo==="direttivo"&&<FF label="Carica"><input value={d.carica||""} onChange={S("carica")} style={IS} placeholder="es. Presidente"/></FF>}
          <FF label="Data iscrizione"><input type="date" value={d.dataIscrizione||""} onChange={S("dataIscrizione")} style={IS}/></FF>
        </div>
      </div>
      <div style={{marginBottom:16}}><div style={sec}>🎂 Nascita</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          <FF label="Data di nascita"><input type="date" value={d.dataNascita||""} onChange={S("dataNascita")} style={IS}/></FF>
          <FF label="Luogo di nascita"><input value={d.luogoNascita||""} onChange={S("luogoNascita")} style={IS}/></FF>
          <FF label="Codice Fiscale" size="full"><input value={d.codiceFiscale||""} onChange={e=>setD(p=>({...p,codiceFiscale:e.target.value.toUpperCase()}))} style={{...IS,fontFamily:"monospace"}} maxLength={16}/></FF>
        </div>
      </div>
      <div style={{marginBottom:16}}><div style={sec}>🏠 Residenza</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          <FF label="Indirizzo" size="full"><input value={d.indirizzo||""} onChange={S("indirizzo")} style={IS}/></FF>
          <FF label="CAP" size="quarter"><input value={d.cap||""} onChange={S("cap")} style={IS} maxLength={5}/></FF>
          <FF label="Città"><input value={d.citta||""} onChange={S("citta")} style={IS}/></FF>
          <FF label="Provincia" size="quarter"><select value={d.provincia||""} onChange={S("provincia")} style={IS}><option value="">—</option>{PROVINCE.map(p=><option key={p} value={p}>{p}</option>)}</select></FF>
          <FF label="Regione"><select value={d.regione||""} onChange={S("regione")} style={IS}><option value="">—</option>{REGIONI.map(r=><option key={r} value={r}>{r}</option>)}</select></FF>
        </div>
      </div>
      <div style={{marginBottom:16}}><div style={sec}>📞 Contatti</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          <FF label="Telefono"><input value={d.telefono||""} onChange={S("telefono")} style={IS} type="tel"/></FF>
          <FF label="Email"><input value={d.email||""} onChange={S("email")} style={IS} type="email"/></FF>
        </div>
      </div>
      <div style={{marginBottom:16}}><div style={sec}>📝 Note</div>
        <FF label="Note" size="full"><textarea value={d.note||""} onChange={S("note")} rows={2} style={{...IS,resize:"vertical"}}/></FF>
      </div>
      <div style={{marginBottom:16}}><div style={sec}>⚙️ Stato</div>
        <label style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",padding:"10px 12px",background:C.surface,borderRadius:10,border:`1px solid ${d.obsoleto?C.orangeBorder:C.border}`}}>
          <input type="checkbox" checked={!!d.obsoleto} onChange={e=>setD(p=>({...p,obsoleto:e.target.checked}))} style={{width:20,height:20,accentColor:C.orange,cursor:"pointer",flexShrink:0}}/>
          <span style={{fontSize:14,color:d.obsoleto?C.orange:C.text}}>🗄️ Obsoleto</span>
        </label>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn color="ghost" full onClick={onCancel}>Annulla</Btn>
        <Btn color="blue" full onClick={()=>onSave(d)} disabled={saving}>{saving?"Salvataggio…":"💾 Salva"}</Btn>
      </div>
    </div>
  );
}

function MovimentoForm({onSave, onCancel, saving}){
  const [tipo,setTipo]=useState("entrata");
  const [conto,setConto]=useState("cassa");
  const [voce,setVoce]=useState("");
  const [catSel,setCatSel]=useState("");
  const [importo,setImporto]=useState("");
  const [data,setData]=useState(new Date().toISOString().slice(0,10));
  const [desc,setDesc]=useState("");
  const cats = tipo==="entrata" ? CAT_ENTRATE : CAT_USCITE;
  const voci = catSel ? (cats[catSel]||[]) : Object.values(cats).flat();
  const giro = isGiroconto(voce);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:4}}>Tipo</label>
          <select value={tipo} onChange={e=>{setTipo(e.target.value);setVoce("");setCatSel("");}} style={IS}>
            <option value="entrata">📈 Entrata</option>
            <option value="uscita">📉 Uscita</option>
          </select>
        </div>
        <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:4}}>Conto</label>
          <select value={conto} onChange={e=>setConto(e.target.value)} style={IS}>
            <option value="cassa">💵 Cassa</option>
            <option value="banca">🏦 Banca</option>
          </select>
        </div>
      </div>
      <div><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:4}}>Categoria</label>
        <select value={catSel} onChange={e=>{setCatSel(e.target.value);setVoce("");}} style={IS}>
          <option value="">— Tutte —</option>
          {Object.keys(cats).map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:4}}>Voce</label>
        <select value={voce} onChange={e=>setVoce(e.target.value)} style={IS}>
          <option value="">— Seleziona —</option>
          {voci.map(v=><option key={v} value={v}>{v}</option>)}
        </select>
      </div>
      {giro&&<div style={{background:"rgba(230,126,34,.1)",border:`1px solid ${C.orangeBorder}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.orange}}>⚠️ Il giroconto non verrà conteggiato nei totali entrate/uscite</div>}
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:4}}>Importo €</label>
          <input type="number" value={importo} onChange={e=>setImporto(e.target.value)} style={IS} placeholder="0,00"/>
        </div>
        <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:4}}>Data</label>
          <input type="date" value={data} onChange={e=>setData(e.target.value)} style={IS}/>
        </div>
      </div>
      <div><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:4}}>Descrizione (opzionale)</label>
        <input value={desc} onChange={e=>setDesc(e.target.value)} style={IS} placeholder="Note aggiuntive…"/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn full color="ghost" onClick={onCancel}>Annulla</Btn>
        <Btn full color={tipo==="entrata"?"green":"red"} onClick={()=>onSave({tipo,conto,voce,importo:parseFloat(importo)||0,data,descrizione:desc})} disabled={saving||!voce||!importo}>
          {saving?"…":`✓ Salva ${tipo==="entrata"?"Entrata":"Uscita"}`}
        </Btn>
      </div>
    </div>
  );
}

function generaBilancio(movimenti, stagione, saldoInizialeCassa, saldoInizialeBanca, logoSrc){
  const mov = movimenti.filter(m => getStagione(m.data)===stagione);
  
  // Calculate totals by category
  const totE = {}, totU = {};
  let totEntrate=0, totUscite=0, totCassa=0, totBanca=0;
  
  mov.forEach(m=>{
    const imp = Number(m.importo)||0;
    const giro = isGiroconto(m.voce);
    if(m.tipo==="entrata"){
      if(!giro) totEntrate+=imp;
      totE[m.voce]=(totE[m.voce]||0)+imp;
      if(m.conto==="cassa") totCassa+=imp;
      else totBanca+=imp;
    } else {
      if(!giro) totUscite+=imp;
      totU[m.voce]=(totU[m.voce]||0)+imp;
      if(m.conto==="cassa") totCassa-=imp;
      else totBanca-=imp;
    }
  });
  
  const utile = totEntrate - totUscite;
  
  const fE = v => totE[v] ? `<td style="text-align:right">€ ${Number(totE[v]).toFixed(2).replace(".",",")}</td>` : `<td style="text-align:right;color:#999">-</td>`;
  const fU = v => totU[v] ? `<td style="text-align:right">€ ${Number(totU[v]).toFixed(2).replace(".",",")}</td>` : `<td style="text-align:right;color:#999">-</td>`;
  const fTot = n => `<strong>€ ${Number(n).toFixed(2).replace(".",",")}</strong>`;
  const giroNote = v => isGiroconto(v) ? `<span style="font-size:9px;color:#888"> (non conteggiato)</span>` : "";

  let rowsE="", rowsU="";
  
  Object.entries(CAT_ENTRATE).forEach(([cat,voci])=>{
    rowsE+=`<tr><td colspan="2" style="background:#f0f4f8;font-weight:700;padding:6px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px">${cat}</td></tr>`;
    voci.forEach(v=>{
      rowsE+=`<tr><td style="padding:4px 10px 4px 20px">${v}${giroNote(v)}</td>${fE(v)}</tr>`;
    });
  });
  
  Object.entries(CAT_USCITE).forEach(([cat,voci])=>{
    rowsU+=`<tr><td colspan="2" style="background:#f0f4f8;font-weight:700;padding:6px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px">${cat}</td></tr>`;
    voci.forEach(v=>{
      rowsU+=`<tr><td style="padding:4px 10px 4px 20px">${v}${giroNote(v)}</td>${fU(v)}</tr>`;
    });
  });

  const html = `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>Bilancio ${stagione}</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:0;padding:20px}
    h1{font-size:18px;text-align:center;margin:0}
    h2{font-size:14px;text-align:center;margin:4px 0 20px}
    h3{font-size:13px;text-align:center;margin:0 0 10px;text-decoration:underline}
    table{width:100%;border-collapse:collapse;margin-bottom:20px}
    tr:nth-child(even){background:#fafafa}
    td{padding:3px 10px;border-bottom:1px solid #eee}
    .header{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px}
    .riepilogo{background:#f8f8f8;border:2px solid #ddd;border-radius:8px;padding:16px;margin-top:20px}
    .riepilogo table{margin:0}
    .firma{margin-top:40px;display:flex;justify-content:space-between}
    .firma div{text-align:center;min-width:150px}
    .firma p{border-top:1px solid #000;margin-top:40px;padding-top:4px;font-size:10px}
    @media print{body{padding:10px}}
  </style></head><body>
  <div class="header">
    <img src="${logoSrc}" style="height:80px"/>
    <div style="text-align:center">
      <h1>BILANCIO</h1>
      <h1>A.S.D. CAMPO LIGURE "IL BORGO"</h1>
      <h2>STAGIONE SPORTIVA ${stagione}</h2>
    </div>
  </div>
  
  <h3>ENTRATE</h3>
  <table><tbody>${rowsE}
    <tr style="background:#e8f5e9;font-weight:700"><td style="padding:8px 10px">TOTALE ENTRATE</td><td style="text-align:right;padding:8px 10px">${fTot(totEntrate)}</td></tr>
  </tbody></table>
  
  <h3>USCITE</h3>
  <table><tbody>${rowsU}
    <tr style="background:#ffebee;font-weight:700"><td style="padding:8px 10px">TOTALE USCITE</td><td style="text-align:right;padding:8px 10px">${fTot(totUscite)}</td></tr>
  </tbody></table>

  <div class="riepilogo">
    <h3 style="text-align:left;margin-bottom:10px">RIEPILOGO</h3>
    <table>
      <tr><td>Totale entrate</td><td style="text-align:right">${fTot(totEntrate)}</td></tr>
      <tr><td>Totale uscite</td><td style="text-align:right">${fTot(totUscite)}</td></tr>
      <tr style="font-weight:700;font-size:13px;background:${utile>=0?"#e8f5e9":"#ffebee"}">
        <td style="padding:6px">UTILE / PERDITA</td>
        <td style="text-align:right;padding:6px;color:${utile>=0?"#27ae60":"#e74c3c"}">${fTot(utile)}</td>
      </tr>
    </table>
    <table style="margin-top:10px">
      <tr><td>Saldo Cassa</td><td style="text-align:right">${fTot(Number(saldoInizialeCassa)+totCassa)}</td></tr>
      <tr><td>Saldo Banca</td><td style="text-align:right">${fTot(Number(saldoInizialeBanca)+totBanca)}</td></tr>
    </table>
  </div>

  <div class="firma">
    <div><p>IL PRESIDENTE</p></div>
    <div><p>IL SEGRETARIO</p></div>
    <div><p>IL TESORIERE</p></div>
  </div>
  <script>window.onload=()=>window.print()<\/script>
  </body></html>`;
  
  const w=window.open("","_blank");
  if(w){w.document.write(html);w.document.close();}
}

function generaListaMovimenti(movimenti, dataDA, dataA, filtTipo, filtConto){
  let mov = movimenti.filter(m=>{
    if(dataDA && m.data < dataDA) return false;
    if(dataA && m.data > dataA) return false;
    if(filtTipo!=="tutti" && m.tipo!==filtTipo) return false;
    if(filtConto!=="tutti" && m.conto!==filtConto) return false;
    return true;
  }).sort((a,b)=>a.data.localeCompare(b.data));
  
  let totE=0, totU=0;
  mov.forEach(m=>{
    if(!isGiroconto(m.voce)){
      if(m.tipo==="entrata") totE+=Number(m.importo)||0;
      else totU+=Number(m.importo)||0;
    }
  });
  
  const rows = mov.map(m=>`
    <tr>
      <td>${m.data?m.data.slice(0,10).split("-").reverse().join("/"):""}</td>
      <td>${m.tipo==="entrata"?"📈 Entrata":"📉 Uscita"}</td>
      <td>${m.conto==="cassa"?"💵 Cassa":"🏦 Banca"}</td>
      <td>${m.voce||""}${isGiroconto(m.voce)?'<span style="font-size:9px;color:#888"> *</span>':''}</td>
      <td>${m.descrizione||""}</td>
      <td style="text-align:right;color:${m.tipo==="entrata"?"#27ae60":"#e74c3c"}">${m.tipo==="entrata"?"+":"-"} € ${Number(m.importo).toFixed(2).replace(".",",")}</td>
    </tr>`).join("");
  
  const html=`<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>Movimenti</title>
  <style>body{font-family:Arial,sans-serif;font-size:11px;margin:20px}h1{font-size:15px;text-align:center}table{width:100%;border-collapse:collapse}th{background:#1a3a5c;color:#fff;padding:6px 8px;text-align:left}td{padding:4px 8px;border-bottom:1px solid #eee}tr:nth-child(even){background:#f9f9f9}.note{font-size:9px;color:#888;margin-top:10px}@media print{body{margin:10px}}</style></head><body>
  <h1>A.S.D. Campo Ligure "Il Borgo" — Lista Movimenti</h1>
  <p style="text-align:center;margin-bottom:10px">Periodo: ${dataDA?dataDA.split("-").reverse().join("/"):"inizio"} → ${dataA?dataA.split("-").reverse().join("/"):"oggi"}</p>
  <table><thead><tr><th>Data</th><th>Tipo</th><th>Conto</th><th>Voce</th><th>Descrizione</th><th style="text-align:right">Importo</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <p style="margin-top:12px"><strong>Totale Entrate: € ${totE.toFixed(2).replace(".",",")} | Totale Uscite: € ${totU.toFixed(2).replace(".",",")} | Saldo: € ${(totE-totU).toFixed(2).replace(".",",")}</strong></p>
  <p class="note">* I giroconti non sono conteggiati nei totali</p>
  <script>window.onload=()=>window.print()<\/script></body></html>`;
  
  const w=window.open("","_blank");
  if(w){w.document.write(html);w.document.close();}
}

  const [session,setSession]=useState(null);
  const [ruolo,setRuolo]=useState(null);
  const [loading,setLoading]=useState(true);
  const [dbError,setDbError]=useState(false);
  const [view,setView]=useState("dashboard");
  const [mobile,setMobile]=useState(isMobile());

  // Data
  const [giocatori,setGiocatori]=useState([]);
  const [sostenitori,setSostenitori]=useState([]);
  const [direttivo,setDirettivo]=useState([]);
  const [movimenti,setMovimenti]=useState([]);
  const [quotaSostenitore,setQuotaSostenitore]=useState(30);

  // UI state
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [editTipo,setEditTipo]=useState(null);
  const [isNew,setIsNew]=useState(false);
  const [delConf,setDelConf]=useState(null);
  const [selItem,setSelItem]=useState(null);
  const [selTipo,setSelTipo]=useState(null);
  const [schedaTab,setSchedaTab]=useState("anagrafica");
  const [showMovForm,setShowMovForm]=useState(false);
  const [movDelConf,setMovDelConf]=useState(null);

  // Filters
  const [search,setSearch]=useState("");
  const [filtObs,setFiltObs]=useState("attivi");
  const [filtTipoMov,setFiltTipoMov]=useState("tutti");
  const [filtContoMov,setFiltContoMov]=useState("tutti");
  const [filtStagione,setFiltStagione]=useState(getStagioneCorrente());

  // Bilancio/Export
  const [showBilancio,setShowBilancio]=useState(false);
  const [bilStagione,setBilStagione]=useState(getStagioneCorrente());
  const [bilSaldoCassa,setBilSaldoCassa]=useState("0");
  const [bilSaldoBanca,setBilSaldoBanca]=useState("0");
  const [showExport,setShowExport]=useState(false);
  const [expDA,setExpDA]=useState("");
  const [expA,setExpA]=useState("");
  const [expTipo,setExpTipo]=useState("tutti");
  const [expConto,setExpConto]=useState("tutti");

  // Quota edit
  const [editQuota,setEditQuota]=useState(false);
  const [nuovaQuota,setNuovaQuota]=useState("30");

  useEffect(()=>{
    const h=()=>setMobile(isMobile());
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session){setLoading(false);return;}
    (async()=>{
      setLoading(true);
      try{
        const {data:prof}=await sb.from("profili").select("ruolo").eq("id",session.user.id).single();
        setRuolo(prof?.ruolo||"viewer");
        const [{data:g},{data:s},{data:dir},{data:mov},{data:imp}] = await Promise.all([
          sb.from("giocatori").select("*").order("cognome"),
          sb.from("sostenitori").select("*").order("cognome"),
          sb.from("direttivo").select("*").order("cognome"),
          sb.from("movimenti_borgo").select("*").order("data",{ascending:false}),
          sb.from("impostazioni_borgo").select("valore").eq("chiave","quota_sostenitore").single(),
        ]);
        setGiocatori((g||[]).map(fromDb));
        setSostenitori((s||[]).map(fromDb));
        setDirettivo((dir||[]).map(fromDb));
        setMovimenti((mov||[]).map(fromDb));
        if(imp) setQuotaSostenitore(parseFloat(imp.valore)||30);
      }catch(e){console.error(e);setDbError(true);}
      setLoading(false);
    })();
  },[session]);

  const isAdmin=ruolo==="admin";
  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};

  const openNew=(tipo)=>{
    const empty={giocatore:EMPTY_GIOCATORE,sostenitore:EMPTY_SOSTENITORE,direttivo:EMPTY_DIRETTIVO}[tipo];
    setEditItem({...empty});setEditTipo(tipo);setIsNew(true);
  };
  const openEdit=(item,tipo)=>{setEditItem({...item});setEditTipo(tipo);setIsNew(false);};

  const handleSave=async(data)=>{
    setSaving(true);
    const table={giocatore:"giocatori",sostenitore:"sostenitori",direttivo:"direttivo"}[editTipo];
    const setter={giocatore:setGiocatori,sostenitore:setSostenitori,direttivo:setDirettivo}[editTipo];
    try{
      if(isNew){
        const {data:saved,error}=await sb.from(table).insert(toDb(data)).select().single();
        if(error) throw error;
        setter(prev=>[...prev,fromDb(saved)].sort((a,b)=>a.cognome.localeCompare(b.cognome)));
        showToast("Aggiunto ✓");
      }else{
        const {error}=await sb.from(table).update(toDb(data)).eq("id",data.id);
        if(error) throw error;
        setter(prev=>prev.map(m=>m.id===data.id?data:m));
        if(selItem?.id===data.id) setSelItem(data);
        showToast("Salvato ✓");
      }
      setEditItem(null);
    }catch{showToast("Errore salvataggio","err");}
    setSaving(false);

    setter(prev=>prev.filter(m=>m.id!==delConf.item.id));

        <div className="bottom-nav" style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,padding:"8px 0"}}>
          {NAV.map(([v,ic,lb])=>(
            <button key={v} onClick={()=>setView(v)} style={{flex:1,background:"none",border:"none",color:view===v?C.goldLight:C.muted,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0",position:"relative"}}>
              <span style={{fontSize:20}}>{ic}</span>
              <span style={{fontSize:9,fontWeight:700}}>{lb}</span>
              {view===v&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,background:C.blue,borderRadius:2}}/>}
            </button>
          ))}
        </div>
      )}

      {/* MODALS */}

      {/* Scheda membro */}
      {selItem&&selTipo&&(
        <Modal title={`${selTipo==="giocatore"?"⚽":selTipo==="sostenitore"?"⭐":"🏛️"} ${selItem.cognome} ${selItem.nome}`} onClose={()=>setSelItem(null)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.surface,borderRadius:10,flexWrap:"wrap"}}>
              <div style={{width:46,height:46,borderRadius:"50%",background:C.blueBg,border:`1px solid ${C.blueBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:C.goldLight,fontSize:16,flexShrink:0}}>{(selItem.cognome||"?")[0]}{(selItem.nome||"?")[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:17,fontFamily:"Georgia,serif",fontWeight:700}}>{selItem.cognome} {selItem.nome}</div>
                <div style={{fontSize:12,color:C.muted}}>
                  {selTipo==="giocatore"&&selItem.ruolo?`${selItem.ruolo} · `:""}
                  {selTipo==="direttivo"&&selItem.carica?`${selItem.carica} · `:""}
                  {selItem.tessera?`Tessera N° ${selItem.tessera}`:""}
                </div>
              </div>
              {selItem.obsoleto&&<span style={{display:"inline-flex",padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:700,background:C.orangeBg,color:C.orange,border:`1px solid ${C.orangeBorder}`}}>🗄️ OBSOLETO</span>}
            </div>
            {[
              {label:"📋 Dati",rows:[["Tessera",selItem.tessera],["Cognome",selItem.cognome],["Nome",selItem.nome],["Sesso",selItem.sesso==="M"?"Maschile":selItem.sesso==="F"?"Femminile":"—"],selTipo==="giocatore"?["Ruolo",selItem.ruolo]:null,selTipo==="direttivo"?["Carica",selItem.carica]:null,["Cod. Fiscale",selItem.codiceFiscale],["Data nascita",fmtDate(selItem.dataNascita)],["Luogo nascita",selItem.luogoNascita],["Iscrizione",fmtDate(selItem.dataIscrizione)]].filter(Boolean)},
              {label:"🏠 Residenza",rows:[["Indirizzo",selItem.indirizzo],["CAP",selItem.cap],["Città",selItem.citta],["Provincia",selItem.provincia],["Regione",selItem.regione]]},
              {label:"📞 Contatti",rows:[["Telefono",selItem.telefono],["Email",selItem.email]]},
            ].map(sec=>(
              <div key={sec.label}>
                <div style={{fontSize:10,color:C.goldLight,letterSpacing:1,textTransform:"uppercase",marginBottom:6,fontWeight:700}}>{sec.label}</div>
                <div style={{background:C.surface,borderRadius:8,overflow:"hidden"}}>
                  {sec.rows.map(([k,v])=>(<div key={k} style={{display:"flex",padding:"8px 14px",borderBottom:`1px solid ${C.borderFaint}`}}><div style={{width:120,fontSize:12,color:C.muted,flexShrink:0}}>{k}</div><div style={{fontSize:13,fontWeight:500}}>{v||"—"}</div></div>))}
                </div>
              </div>
            ))}
            {selItem.note&&<div><div style={{fontSize:10,color:C.goldLight,textTransform:"uppercase",marginBottom:6,fontWeight:700}}>📝 Note</div><div style={{background:C.surface,borderRadius:8,padding:"10px 14px",fontSize:13}}>{selItem.note}</div></div>}
            {selItem.telefono&&<a href={`tel:${selItem.telefono}`} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:C.greenBg,border:`1px solid ${C.greenBorder}`,color:C.green,borderRadius:10,padding:12,fontWeight:700,textDecoration:"none",fontSize:15}}>📞 Chiama {selItem.nome}</a>}
            {isAdmin&&<Btn color="blue" full onClick={()=>{openEdit(selItem,selTipo);setSelItem(null);}}>✏️ Modifica</Btn>}
          </div>
        </Modal>
      )}

      {/* Form nuovo/modifica membro */}
      {editItem&&(
        <Modal title={isNew?`➕ Nuovo ${editTipo}`:``+"✏️ Modifica"} onClose={()=>setEditItem(null)} wide>
          <MembroForm data={editItem} tipo={editTipo} onSave={handleSave} onCancel={()=>setEditItem(null)} saving={saving}/>
        </Modal>
      )}

      {/* Form nuovo movimento */}
      {showMovForm&&(
        <Modal title="➕ Nuovo Movimento" onClose={()=>setShowMovForm(false)}>
          <MovimentoForm onSave={saveMovimento} onCancel={()=>setShowMovForm(false)} saving={saving}/>
        </Modal>
      )}

      {/* Bilancio PDF */}
      {showBilancio&&(
        <Modal title="📄 Genera Bilancio PDF" onClose={()=>setShowBilancio(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:6}}>Stagione sportiva</label>
              <select value={bilStagione} onChange={e=>setBilStagione(e.target.value)} style={IS}>
                {stagioni.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:6}}>Saldo iniziale Cassa €</label><input type="number" value={bilSaldoCassa} onChange={e=>setBilSaldoCassa(e.target.value)} style={IS} placeholder="0,00"/></div>
              <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:6}}>Saldo iniziale Banca €</label><input type="number" value={bilSaldoBanca} onChange={e=>setBilSaldoBanca(e.target.value)} style={IS} placeholder="0,00"/></div>
            </div>
            <div style={{background:C.blueBg,border:`1px solid ${C.blueBorder}`,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.goldLight}}>
              💡 Il PDF verrà aperto in una nuova finestra. Usa la stampa del browser per salvarlo.
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn full color="ghost" onClick={()=>setShowBilancio(false)}>Annulla</Btn>
              <Btn full color="blue" onClick={()=>{generaBilancio(movimenti,bilStagione,bilSaldoCassa,bilSaldoBanca,logo);setShowBilancio(false);}}>📄 Genera PDF</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Export lista movimenti */}
      {showExport&&(
        <Modal title="📋 Esporta Lista Movimenti" onClose={()=>setShowExport(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:6}}>Da data</label><input type="date" value={expDA} onChange={e=>setExpDA(e.target.value)} style={IS}/></div>
              <div style={{flex:1}}><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:6}}>A data</label><input type="date" value={expA} onChange={e=>setExpA(e.target.value)} style={IS}/></div>
            </div>
            <div><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:6}}>Tipo</label>
              <select value={expTipo} onChange={e=>setExpTipo(e.target.value)} style={IS}><option value="tutti">Tutti</option><option value="entrata">Solo Entrate</option><option value="uscita">Solo Uscite</option></select>
            </div>
            <div><label style={{fontSize:11,color:C.muted,textTransform:"uppercase",display:"block",marginBottom:6}}>Conto</label>
              <select value={expConto} onChange={e=>setExpConto(e.target.value)} style={IS}><option value="tutti">Cassa + Banca</option><option value="cassa">Solo Cassa</option><option value="banca">Solo Banca</option></select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn full color="ghost" onClick={()=>setShowExport(false)}>Annulla</Btn>
              <Btn full color="blue" onClick={()=>{generaListaMovimenti(movimenti,expDA,expA,expTipo,expConto);setShowExport(false);}}>📋 Genera PDF</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Conferma elimina membro */}
      {delConf&&<ConfirmDialog msg={`Eliminare ${delConf.item.cognome} ${delConf.item.nome}?`} onConfirm={handleDelete} onCancel={()=>setDelConf(null)}/>}

      {/* Conferma elimina movimento */}
      {movDelConf&&<ConfirmDialog msg={`Eliminare il movimento "${movDelConf.voce}" di ${fmtEuro(movDelConf.importo)}?`} onConfirm={()=>deleteMovimento(movDelConf.id)} onCancel={()=>setMovDelConf(null)}/>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
